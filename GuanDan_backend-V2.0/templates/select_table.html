<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择桌号</title>
</head>
<body>
    <nav>

        <a href="{{ url_for('generate_matches') }}">生成对战列表</a>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div id="flash-messages" style="display: none;">
        {% for category, message in messages %}
            <span class="flash-message" data-category="{{ category }}">{{ message }}</span>
        {% endfor %}
        </div>
        <script>
        document.querySelectorAll(".flash-message").forEach(function(msgSpan) {
            alert(msgSpan.innerText);
        });
        </script>
    {% endif %}
    {% endwith %}

    <h1>选择桌号</h1>
    <form action="{{ url_for('select_table') }}" method="POST">
        <label for="table_num">桌号：</label>
        <input type="number" id="table_num" name="table_num" required><br><br>

        <button type="submit">查询信息</button>
    </form>

</body>
</html>
